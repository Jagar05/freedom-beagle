<!DOCTYPE html>
<html lang="en">
<head>
<title>{{ page.title }} — {{ site.title }}</title>
<meta name="description" content="{{ page.dek | strip_html | strip_newlines | truncate: 155 }}">
{% include head.html %}
</head>
<body>

{% include theme-toggle.html %}

{% include site-header.html %}

<div class="wrap">
  <article class="article">
    <p class="article__kicker">{{ page.section }}</p>
    <h1 class="article__headline">{{ page.title }}</h1>
    <p class="article__byline">FREEDOM BEAGLE STAFF &middot; {{ page.date | date: "%B %-d, %Y" | upcase }}</p>

    <div class="article__body">
      {{ content }}
    </div>
  </article>

  <footer class="site-footer">
    <span>&copy; 2026 Freedom Beagle. No masters. No leash.</span>
    <span><a href="{{ '/' | relative_url }}">&larr; Back to home</a></span>
  </footer>
</div>

<script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
</body>
</html>
